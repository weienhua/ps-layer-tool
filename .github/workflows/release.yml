name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build and package
        run: npm run package

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            installer/com.layertool.panel-v*.zip
            installer/com.layertool.panel-installer.exe
            installer/com.layertool.panel-uninstaller.exe
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
