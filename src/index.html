<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图层处理工具</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">
    <!-- Toast 提示容器 -->
    <div id="toastContainer"></div>
    <div class="header card">
      <h1>图层处理工具</h1>
      <div class="doc-info" id="docInfo">未检测到打开的文档</div>
    </div>

    <!-- Tab 导航栏 -->
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="layerInfo">图层信息</button>
      <button class="tab-btn" data-tab="layerExport">图层处理</button>
      <button class="tab-btn" data-tab="xmlTemplate">XML模板</button>
    </div>

    <!-- 图层信息 Tab -->
    <div class="tab-content active" id="tabLayerInfo">

    <div class="section card preset-form">
      <div class="section-title">预设配置</div>
      <div class="row">
        <label>预设名</label>
        <input type="text" id="presetName" placeholder="例如：UI导出模板">
      </div>
      <div class="row">
        <label>位置锚点</label>
        <div class="anchor-row">
          <div class="anchor-grid-selector" id="anchorGridSelector">
            <button class="anchor-grid-cell" type="button" data-anchor="topLeft" aria-label="左上锚点"></button>
            <button class="anchor-grid-cell" type="button" data-anchor="topCenter" aria-label="上中锚点"></button>
            <button class="anchor-grid-cell" type="button" data-anchor="topRight" aria-label="右上锚点"></button>
            <button class="anchor-grid-cell" type="button" data-anchor="middleLeft" aria-label="左中锚点"></button>
            <button class="anchor-grid-cell" type="button" data-anchor="center" aria-label="中心锚点"></button>
            <button class="anchor-grid-cell" type="button" data-anchor="middleRight" aria-label="右中锚点"></button>
            <button class="anchor-grid-cell" type="button" data-anchor="bottomLeft" aria-label="左下锚点"></button>
            <button class="anchor-grid-cell" type="button" data-anchor="bottomCenter" aria-label="下中锚点"></button>
            <button class="anchor-grid-cell" type="button" data-anchor="bottomRight" aria-label="右下锚点"></button>
          </div>
          <select id="anchorSelect">
            <option value="topLeft">左上</option>
            <option value="topCenter">上中</option>
            <option value="topRight">右上</option>
            <option value="middleLeft">左中</option>
            <option value="center">中心</option>
            <option value="middleRight">右中</option>
            <option value="bottomLeft">左下</option>
            <option value="bottomCenter">下中</option>
            <option value="bottomRight">右下</option>
          </select>
        </div>
      </div>
      <div class="row">
        <label>排序方式</label>
        <select id="sortSelect">
          <option value="xAsc">按 X 升序</option>
          <option value="yAsc">按 Y 升序</option>
          <option value="psOrderBottomToTop">按PS图层顺序</option>
        </select>
      </div>
      <div class="row">
        <label>缩放动画</label>
        <input type="text" id="scaleAnimInput" placeholder='例如：(1-0.1*sin((#loop-100*0)/300))'>
      </div>
      <div class="row">
        <label>旋转动画</label>
        <input type="text" id="rotateAnimInput" placeholder='例如：(5*sin((#loop-100*0)/300))'>
      </div>
      <div class="row">
        <label>输出模板</label>
        <div class="custom-select" id="templateSelectWrapper">
          <div class="custom-select-trigger" id="templateSelectTrigger" tabindex="0">
            <span class="select-value">加载中...</span>
            <span class="select-arrow">▼</span>
          </div>
          <div class="custom-select-dropdown" id="templateSelectDropdown"></div>
        </div>
        <textarea id="templateInput" rows="4" placeholder='例如：x="{x}" y="{y}" w="{width}" h="{height}"'></textarea>
        <div class="template-hint" id="templateHint"></div>
      </div>
      <div class="row actions action-group">
        <button class="btn btn-primary" id="btnFetchLayers">获取选中图层信息</button>
        <button class="btn" id="btnSavePreset">保存预设</button>
      </div>
    </div>

    <div class="section card">
      <div class="section-title">预设列表</div>
      <div id="presetList" class="preset-list"></div>
    </div>

    <div class="section card">
      <div class="section-title">输出结果</div>
      <div class="row actions">
        <button class="btn" id="btnCopyOutput">复制输出</button>
      </div>
      <textarea id="outputText" rows="8" readonly></textarea>
    </div>

    </div><!-- /tabLayerInfo -->

    <!-- 图层处理 Tab -->
    <div class="tab-content" id="tabLayerExport">
      <!-- 导出设置 -->
      <div class="section card">
        <div class="section-title">导出设置</div>
        <div class="row">
          <label>导出路径</label>
          <div class="export-path-row">
            <input type="text" id="exportPath" placeholder="选择导出路径...">
            <button class="btn btn-sm" id="btnBrowsePath">浏览</button>
          </div>
        </div>
        <div class="row">
          <label>导出格式</label>
          <select id="exportFormat">
            <option value="PNGFormat" selected>PNG</option>
            <option value="JPEG">JPG</option>
            <option value="bMPFormat">BMP</option>
          </select>
        </div>
        <div class="row">
          <label class="checkbox-label">
            <input type="checkbox" id="cbExportHidden">
            <span>导出不可见图层</span>
          </label>
        </div>
        <div class="row">
          <label class="checkbox-label">
            <input type="checkbox" id="cbExportXML">
            <span>导出图层信息 XML (manifest.xml)</span>
          </label>
        </div>
        <div class="row">
          <label class="checkbox-label">
            <input type="checkbox" id="cbFolderHierarchy">
            <span>保留文件夹层级</span>
          </label>
        </div>
      </div>

      <!-- 导出操作 -->
      <div class="section card">
        <div class="section-title">导出操作</div>
        <div class="export-actions">
          <button class="btn btn-primary" id="btnExportSelected">导出选中图层</button>
          <button class="btn" id="btnExportGroup">导出选中图层组</button>
          <button class="btn" id="btnExportAll">导出全部图层</button>
        </div>
        <div class="export-progress" id="exportProgress" style="display:none;">
          <span class="progress-text" id="progressText">导出中...</span>
        </div>
      </div>

      <!-- 导出结果 -->
      <div class="section card">
        <div class="section-title">导出结果</div>
        <div id="exportResultList" class="export-result-list">
          <div class="empty-state">尚未导出</div>
        </div>
      </div>
    </div><!-- /tabLayerExport -->

    <!-- XML 模板 Tab -->
    <div class="tab-content" id="tabXmlTemplate">
      <!-- 变量名 -->
      <div class="section card">
        <div class="section-title">变量配置</div>
        <div class="row">
          <label>变量名</label>
          <input type="text" id="xmlVarName" placeholder="例如：#battery_level">
        </div>
        <div class="row">
          <label>数据类型</label>
          <div class="xml-datatype-group" id="xmlDatatypeGroup">
            <button class="btn xml-datatype-btn active" data-type="percentage">百分比</button>
            <button class="btn xml-datatype-btn" data-type="temperature">温度</button>
            <button class="btn xml-datatype-btn" data-type="steps">步数</button>
          </div>
        </div>
        <div class="row">
          <label>位置锚点</label>
          <div class="anchor-row">
            <div class="anchor-grid-selector" id="xmlPositionAnchorGrid">
              <button class="anchor-grid-cell" type="button" data-anchor="topLeft" aria-label="左上"></button>
              <button class="anchor-grid-cell" type="button" data-anchor="topCenter" aria-label="上中"></button>
              <button class="anchor-grid-cell" type="button" data-anchor="topRight" aria-label="右上"></button>
              <button class="anchor-grid-cell" type="button" data-anchor="middleLeft" aria-label="左中"></button>
              <button class="anchor-grid-cell" type="button" data-anchor="center" aria-label="中心"></button>
              <button class="anchor-grid-cell" type="button" data-anchor="middleRight" aria-label="右中"></button>
              <button class="anchor-grid-cell" type="button" data-anchor="bottomLeft" aria-label="左下"></button>
              <button class="anchor-grid-cell" type="button" data-anchor="bottomCenter" aria-label="下中"></button>
              <button class="anchor-grid-cell" type="button" data-anchor="bottomRight" aria-label="右下"></button>
            </div>
            <select id="xmlPositionAnchorSelect">
              <option value="topLeft">左上</option>
              <option value="topCenter">上中</option>
              <option value="topRight">右上</option>
              <option value="middleLeft">左中</option>
              <option value="center">中心</option>
              <option value="middleRight">右中</option>
              <option value="bottomLeft">左下</option>
              <option value="bottomCenter">下中</option>
              <option value="bottomRight">右下</option>
            </select>
          </div>
        </div>
        <div class="row">
          <label>排序方式</label>
          <select id="xmlSortSelect">
            <option value="xAsc">按 X 升序</option>
            <option value="yAsc">按 Y 升序</option>
            <option value="psOrderBottomToTop">按PS图层顺序</option>
          </select>
        </div>
        <div class="row">
          <label>对齐方式</label>
          <div class="anchor-row">
            <div class="anchor-grid-selector" id="xmlAnchorGridSelector">
              <button class="anchor-grid-cell is-active" type="button" data-anchor="topLeft" aria-label="左上" aria-pressed="true"></button>
              <button class="anchor-grid-cell" type="button" data-anchor="topCenter" aria-label="上中"></button>
              <button class="anchor-grid-cell" type="button" data-anchor="topRight" aria-label="右上"></button>
              <button class="anchor-grid-cell" type="button" data-anchor="middleLeft" aria-label="左中"></button>
              <button class="anchor-grid-cell" type="button" data-anchor="center" aria-label="中心"></button>
              <button class="anchor-grid-cell" type="button" data-anchor="middleRight" aria-label="右中"></button>
              <button class="anchor-grid-cell" type="button" data-anchor="bottomLeft" aria-label="左下"></button>
              <button class="anchor-grid-cell" type="button" data-anchor="bottomCenter" aria-label="下中"></button>
              <button class="anchor-grid-cell" type="button" data-anchor="bottomRight" aria-label="右下"></button>
            </div>
            <select id="xmlAnchorSelect">
              <option value="topLeft" selected>左上</option>
              <option value="topCenter">上中</option>
              <option value="topRight">右上</option>
              <option value="middleLeft">左中</option>
              <option value="center">中心</option>
              <option value="middleRight">右中</option>
              <option value="bottomLeft">左下</option>
              <option value="bottomCenter">下中</option>
              <option value="bottomRight">右下</option>
            </select>
          </div>
        </div>
        <div class="row actions action-group">
          <button class="btn btn-primary" id="btnGenerateXML">生成 XML 并复制</button>
        </div>
      </div>

      <!-- 输出结果 -->
      <div class="section card">
        <div class="section-title">输出结果</div>
        <div class="row actions">
          <button class="btn" id="btnCopyXML">复制输出</button>
        </div>
        <textarea id="xmlOutput" rows="10" readonly></textarea>
      </div>
    </div><!-- /tabXmlTemplate -->

    <div class="status-bar" id="statusBar">就绪</div>

    <!-- 调试面板 -->
    <div class="debug-toggle" id="debugToggle">
      <span>调试模式</span>
      <label class="switch">
        <input type="checkbox" id="debugMode">
        <span class="slider"></span>
      </label>
    </div>

    <div class="debug-panel" id="debugPanel" style="display: none;">
      <div class="debug-header">
        <span>通信日志</span>
        <button class="btn btn-sm" id="btnClearLogs">清空</button>
      </div>
      <div class="debug-logs" id="debugLogs"></div>
    </div>

    <script src="lib/CSInterface.js"></script>
    <script src="bundle.js"></script>
  </div>
</body>

</html>
