<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图层处理工具</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">
    <!-- Toast 提示容器 -->
    <div id="toastContainer"></div>
    <div class="header card">
      <h1>图层处理工具</h1>
      <div class="doc-info" id="docInfo">未检测到打开的文档</div>
    </div>

    <!-- Tab 导航栏 -->
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="layerInfo">图层信息</button>
      <button class="tab-btn" data-tab="templateOutput">模板输出</button>
      <button class="tab-btn" data-tab="layerExport">图层处理</button>
      <button class="tab-btn" data-tab="xmlTemplate">XML模板</button>
    </div>

    <!-- 图层信息 Tab -->
    <div class="tab-content active" id="tabLayerInfo">

    <div class="section card preset-form section-collapsible" data-section-key="tab1-preset-form">
      <div class="section-header">
        <span class="section-toggle-icon">▼</span>
        <div class="section-title">预设配置</div>
      </div>
      <div class="section-body">
      <div class="row">
        <label>预设名</label>
        <input type="text" id="presetName" placeholder="例如：UI导出模板">
      </div>
      <div class="row">
        <label>位置锚点</label>
        <div class="anchor-row">
          <div class="anchor-grid-selector" id="anchorGridSelector">
            <button class="anchor-grid-cell" type="button" data-anchor="topLeft" aria-label="左上锚点"></button>
            <button class="anchor-grid-cell" type="button" data-anchor="topCenter" aria-label="上中锚点"></button>
            <button class="anchor-grid-cell" type="button" data-anchor="topRight" aria-label="右上锚点"></button>
            <button class="anchor-grid-cell" type="button" data-anchor="middleLeft" aria-label="左中锚点"></button>
            <button class="anchor-grid-cell" type="button" data-anchor="center" aria-label="中心锚点"></button>
            <button class="anchor-grid-cell" type="button" data-anchor="middleRight" aria-label="右中锚点"></button>
            <button class="anchor-grid-cell" type="button" data-anchor="bottomLeft" aria-label="左下锚点"></button>
            <button class="anchor-grid-cell" type="button" data-anchor="bottomCenter" aria-label="下中锚点"></button>
            <button class="anchor-grid-cell" type="button" data-anchor="bottomRight" aria-label="右下锚点"></button>
          </div>
          <select id="anchorSelect">
            <option value="topLeft">左上</option>
            <option value="topCenter">上中</option>
            <option value="topRight">右上</option>
            <option value="middleLeft">左中</option>
            <option value="center">中心</option>
            <option value="middleRight">右中</option>
            <option value="bottomLeft">左下</option>
            <option value="bottomCenter">下中</option>
            <option value="bottomRight">右下</option>
          </select>
        </div>
      </div>
      <div class="row">
        <label>排序方式</label>
        <select id="sortSelect">
          <option value="xAsc">按 X 升序</option>
          <option value="yAsc">按 Y 升序</option>
          <option value="psOrderBottomToTop">按PS图层顺序</option>
        </select>
      </div>
      <div class="row">
        <label>缩放动画</label>
        <input type="text" id="scaleAnimInput" placeholder='例如：(1-0.1*sin((#loop-100*0)/300))'>
      </div>
      <div class="row">
        <label>旋转动画</label>
        <input type="text" id="rotateAnimInput" placeholder='例如：(5*sin((#loop-100*0)/300))'>
      </div>
      <div class="row">
        <label>输出模板</label>
        <div class="custom-select" id="templateSelectWrapper">
          <div class="custom-select-trigger" id="templateSelectTrigger" tabindex="0">
            <span class="select-value">加载中...</span>
            <span class="select-arrow">▼</span>
          </div>
          <div class="custom-select-dropdown" id="templateSelectDropdown"></div>
        </div>
        <textarea id="templateInput" rows="4" placeholder='例如：x="{x}" y="{y}" w="{width}" h="{height}"'></textarea>
        <div class="hint-collapsible" data-hint-key="tab1-vars">
          <div class="hint-header">
            <span class="hint-toggle-icon">▼</span>
            <span>模板变量提示</span>
          </div>
          <div class="hint-body">
            <div class="template-hint" id="templateHint"></div>
          </div>
        </div>
      </div>
      <div class="row actions action-group">
        <button class="btn btn-primary" id="btnFetchLayers">获取选中图层信息</button>
        <button class="btn" id="btnSavePreset">保存预设</button>
      </div>
      </div><!-- /section-body -->
    </div>

    <div class="section card section-collapsible" data-section-key="tab1-preset-list">
      <div class="section-header">
        <span class="section-toggle-icon">▼</span>
        <div class="section-title">预设列表</div>
      </div>
      <div class="section-body">
        <div id="presetList" class="preset-list"></div>
      </div>
    </div>

    <div class="section card section-collapsible" data-section-key="tab1-output">
      <div class="section-header">
        <span class="section-toggle-icon">▼</span>
        <div class="section-title">输出结果</div>
      </div>
      <div class="section-body">
        <div class="row actions">
          <button class="btn" id="btnCopyOutput">复制输出</button>
        </div>
        <textarea id="outputText" rows="8" readonly></textarea>
      </div>
    </div>

    </div><!-- /tabLayerInfo -->

    <!-- 模板输出 Tab -->
    <div class="tab-content" id="tabTemplateOutput">

    <div class="section card preset-form section-collapsible" data-section-key="tab2-preset-form">
      <div class="section-header">
        <span class="section-toggle-icon">▼</span>
        <div class="section-title">预设配置</div>
      </div>
      <div class="section-body">
      <div class="row">
        <label>预设名</label>
        <input type="text" id="tplOutPresetName" placeholder="例如：模板输出预设">
      </div>
      <div class="row">
        <label>位置锚点</label>
        <div class="anchor-row">
          <div class="anchor-grid-selector" id="tplOutAnchorGridSelector">
            <button class="anchor-grid-cell" type="button" data-anchor="topLeft" aria-label="左上锚点"></button>
            <button class="anchor-grid-cell" type="button" data-anchor="topCenter" aria-label="上中锚点"></button>
            <button class="anchor-grid-cell" type="button" data-anchor="topRight" aria-label="右上锚点"></button>
            <button class="anchor-grid-cell" type="button" data-anchor="middleLeft" aria-label="左中锚点"></button>
            <button class="anchor-grid-cell" type="button" data-anchor="center" aria-label="中心锚点"></button>
            <button class="anchor-grid-cell" type="button" data-anchor="middleRight" aria-label="右中锚点"></button>
            <button class="anchor-grid-cell" type="button" data-anchor="bottomLeft" aria-label="左下锚点"></button>
            <button class="anchor-grid-cell" type="button" data-anchor="bottomCenter" aria-label="下中锚点"></button>
            <button class="anchor-grid-cell" type="button" data-anchor="bottomRight" aria-label="右下锚点"></button>
          </div>
          <select id="tplOutAnchorSelect">
            <option value="topLeft">左上</option>
            <option value="topCenter">上中</option>
            <option value="topRight">右上</option>
            <option value="middleLeft">左中</option>
            <option value="center">中心</option>
            <option value="middleRight">右中</option>
            <option value="bottomLeft">左下</option>
            <option value="bottomCenter">下中</option>
            <option value="bottomRight">右下</option>
          </select>
        </div>
      </div>
      <div class="row">
        <label>排序方式</label>
        <select id="tplOutSortSelect">
          <option value="xAsc">按 X 升序</option>
          <option value="yAsc">按 Y 升序</option>
          <option value="psOrderBottomToTop">按PS图层顺序</option>
        </select>
      </div>
      <div class="row">
        <label>输出模板</label>
        <div class="custom-select" id="tplOutTemplateSelectWrapper">
          <div class="custom-select-trigger" id="tplOutTemplateSelectTrigger" tabindex="0">
            <span class="select-value">加载中...</span>
            <span class="select-arrow">▼</span>
          </div>
          <div class="custom-select-dropdown" id="tplOutTemplateSelectDropdown"></div>
        </div>
        <textarea id="tplOutTemplateInput" rows="4" placeholder='例如：&#10;<Image src="{path[0]}{name[0]}.png" x="{x[0]}" y="{y[0]}" />&#10;<Image src="{path[1]}{name[1]}.png" x="{x[1]}" y="{y[1]}" />'></textarea>
        <div class="hint-collapsible" data-hint-key="tab2-vars">
          <div class="hint-header">
            <span class="hint-toggle-icon">▼</span>
            <span>模板变量提示</span>
          </div>
          <div class="hint-body">
            <div class="template-hint" id="tplOutTemplateHint"></div>
          </div>
        </div>
      </div>
      <div class="row actions action-group">
        <button class="btn btn-primary" id="tplOutBtnFetchLayers">获取选中图层信息</button>
        <button class="btn" id="tplOutBtnSavePreset">保存预设</button>
      </div>
      </div><!-- /section-body -->
    </div>

    <div class="section card section-collapsible" data-section-key="tab2-preset-list">
      <div class="section-header">
        <span class="section-toggle-icon">▼</span>
        <div class="section-title">预设列表</div>
      </div>
      <div class="section-body">
        <div id="tplOutPresetList" class="preset-list"></div>
      </div>
    </div>

    <div class="section card section-collapsible" data-section-key="tab2-output">
      <div class="section-header">
        <span class="section-toggle-icon">▼</span>
        <div class="section-title">输出结果</div>
      </div>
      <div class="section-body">
        <div class="row actions">
          <button class="btn" id="tplOutBtnCopyOutput">复制输出</button>
        </div>
        <textarea id="tplOutOutputText" rows="8" readonly></textarea>
      </div>
    </div>

    </div><!-- /tabTemplateOutput -->

    <!-- 图层处理 Tab -->
    <div class="tab-content" id="tabLayerExport">
      <!-- 导出设置 -->
      <div class="section card section-collapsible" data-section-key="tab3-export-settings">
        <div class="section-header">
          <span class="section-toggle-icon">▼</span>
          <div class="section-title">导出设置</div>
        </div>
        <div class="section-body">
          <div class="row">
            <label>导出路径</label>
            <div class="export-path-row">
              <input type="text" id="exportPath" placeholder="选择导出路径...">
              <button class="btn btn-sm" id="btnBrowsePath">浏览</button>
            </div>
          </div>
          <div class="row">
            <label>导出格式</label>
            <select id="exportFormat">
              <option value="PNGFormat" selected>PNG</option>
              <option value="JPEG">JPG</option>
              <option value="bMPFormat">BMP</option>
            </select>
          </div>
          <div class="row">
            <label class="checkbox-label">
              <input type="checkbox" id="cbExportHidden">
              <span>导出不可见图层</span>
            </label>
          </div>
          <div class="row">
            <label class="checkbox-label">
              <input type="checkbox" id="cbExportXML">
              <span>导出图层信息 XML (manifest.xml)</span>
            </label>
          </div>
          <div class="row">
            <label class="checkbox-label">
              <input type="checkbox" id="cbFolderHierarchy">
              <span>保留文件夹层级</span>
            </label>
          </div>
          <div class="row">
            <label class="checkbox-label">
              <input type="checkbox" id="cbTrimTransparent" checked>
              <span>裁剪透明像素</span>
            </label>
          </div>
        </div>
      </div>

      <!-- 导出操作 -->
      <div class="section card section-collapsible" data-section-key="tab3-export-actions">
        <div class="section-header">
          <span class="section-toggle-icon">▼</span>
          <div class="section-title">导出操作</div>
        </div>
        <div class="section-body">
          <div class="export-actions">
            <button class="btn btn-primary" id="btnExportSelected">导出选中图层</button>
            <button class="btn" id="btnExportGroup">导出选中图层组</button>
            <button class="btn" id="btnExportAll">导出全部图层</button>
          </div>
          <div class="export-progress" id="exportProgress" style="display:none;">
            <span class="progress-text" id="progressText">导出中...</span>
          </div>
        </div>
      </div>

      <!-- 导出结果 -->
      <div class="section card section-collapsible" data-section-key="tab3-export-result">
        <div class="section-header">
          <span class="section-toggle-icon">▼</span>
          <div class="section-title">导出结果</div>
        </div>
        <div class="section-body">
          <div id="exportResultList" class="export-result-list">
            <div class="empty-state">尚未导出</div>
          </div>
        </div>
      </div>
    </div><!-- /tabLayerExport -->

    <!-- XML 模板 Tab -->
    <div class="tab-content" id="tabXmlTemplate">
      <!-- 变量名 -->
      <div class="section card section-collapsible" data-section-key="tab4-var-config">
        <div class="section-header">
          <span class="section-toggle-icon">▼</span>
          <div class="section-title">变量配置</div>
        </div>
        <div class="section-body">
        <div class="row">
          <label>变量名</label>
          <input type="text" id="xmlVarName" placeholder="例如：#battery_level">
        </div>
        <div class="row">
          <label>数据类型</label>
          <div class="xml-datatype-group" id="xmlDatatypeGroup">
            <button class="btn xml-datatype-btn active" data-type="percentage">百分比</button>
            <button class="btn xml-datatype-btn" data-type="temperature">温度</button>
            <button class="btn xml-datatype-btn" data-type="steps">步数</button>
          </div>
        </div>
        <div class="row">
          <label>位置锚点</label>
          <div class="anchor-row">
            <div class="anchor-grid-selector" id="xmlPositionAnchorGrid">
              <button class="anchor-grid-cell" type="button" data-anchor="topLeft" aria-label="左上"></button>
              <button class="anchor-grid-cell" type="button" data-anchor="topCenter" aria-label="上中"></button>
              <button class="anchor-grid-cell" type="button" data-anchor="topRight" aria-label="右上"></button>
              <button class="anchor-grid-cell" type="button" data-anchor="middleLeft" aria-label="左中"></button>
              <button class="anchor-grid-cell" type="button" data-anchor="center" aria-label="中心"></button>
              <button class="anchor-grid-cell" type="button" data-anchor="middleRight" aria-label="右中"></button>
              <button class="anchor-grid-cell" type="button" data-anchor="bottomLeft" aria-label="左下"></button>
              <button class="anchor-grid-cell" type="button" data-anchor="bottomCenter" aria-label="下中"></button>
              <button class="anchor-grid-cell" type="button" data-anchor="bottomRight" aria-label="右下"></button>
            </div>
            <select id="xmlPositionAnchorSelect">
              <option value="topLeft">左上</option>
              <option value="topCenter">上中</option>
              <option value="topRight">右上</option>
              <option value="middleLeft">左中</option>
              <option value="center">中心</option>
              <option value="middleRight">右中</option>
              <option value="bottomLeft">左下</option>
              <option value="bottomCenter">下中</option>
              <option value="bottomRight">右下</option>
            </select>
          </div>
        </div>
        <div class="row">
          <label>排序方式</label>
          <select id="xmlSortSelect">
            <option value="xAsc">按 X 升序</option>
            <option value="yAsc">按 Y 升序</option>
            <option value="psOrderBottomToTop">按PS图层顺序</option>
          </select>
        </div>
        <div class="row">
          <label>对齐方式</label>
          <div class="anchor-row">
            <div class="anchor-grid-selector" id="xmlAnchorGridSelector">
              <button class="anchor-grid-cell is-active" type="button" data-anchor="topLeft" aria-label="左上" aria-pressed="true"></button>
              <button class="anchor-grid-cell" type="button" data-anchor="topCenter" aria-label="上中"></button>
              <button class="anchor-grid-cell" type="button" data-anchor="topRight" aria-label="右上"></button>
              <button class="anchor-grid-cell" type="button" data-anchor="middleLeft" aria-label="左中"></button>
              <button class="anchor-grid-cell" type="button" data-anchor="center" aria-label="中心"></button>
              <button class="anchor-grid-cell" type="button" data-anchor="middleRight" aria-label="右中"></button>
              <button class="anchor-grid-cell" type="button" data-anchor="bottomLeft" aria-label="左下"></button>
              <button class="anchor-grid-cell" type="button" data-anchor="bottomCenter" aria-label="下中"></button>
              <button class="anchor-grid-cell" type="button" data-anchor="bottomRight" aria-label="右下"></button>
            </div>
            <select id="xmlAnchorSelect">
              <option value="topLeft" selected>左上</option>
              <option value="topCenter">上中</option>
              <option value="topRight">右上</option>
              <option value="middleLeft">左中</option>
              <option value="center">中心</option>
              <option value="middleRight">右中</option>
              <option value="bottomLeft">左下</option>
              <option value="bottomCenter">下中</option>
              <option value="bottomRight">右下</option>
            </select>
          </div>
        </div>
        <div class="row">
          <label>输出选项</label>
          <div class="output-options-group">
            <label class="checkbox-label">
              <input type="checkbox" id="xmlIncludeRotation" checked>
              <span>输出 rotation 属性</span>
            </label>
            <label class="checkbox-label">
              <input type="checkbox" id="xmlOutputSize">
              <span>输出图片宽高</span>
            </label>
          </div>
        </div>
        <div class="row actions action-group">
          <button class="btn btn-primary" id="btnGenerateXML">生成 XML 并复制</button>
        </div>
        <div class="hint-collapsible" data-hint-key="tab4-vars">
          <div class="hint-header">
            <span class="hint-toggle-icon">▼</span>
            <span>常用变量</span>
          </div>
          <div class="hint-body">
            <div class="xml-vars-panel" id="xmlVarsPanel">
              <div class="xml-vars-list" id="xmlVarsList"></div>
              <div class="xml-vars-actions">
                <button class="btn btn-sm" id="btnAddXmlVar">+ 添加变量</button>
                <button class="btn btn-sm" id="btnResetXmlVars">恢复默认</button>
              </div>
            </div>
          </div>
        </div>
        </div><!-- /section-body -->
      </div>

      <!-- 输出结果 -->
      <div class="section card section-collapsible" data-section-key="tab4-output">
        <div class="section-header">
          <span class="section-toggle-icon">▼</span>
          <div class="section-title">输出结果</div>
        </div>
        <div class="section-body">
          <div class="row actions">
            <button class="btn" id="btnCopyXML">复制输出</button>
          </div>
          <textarea id="xmlOutput" rows="10" readonly></textarea>
        </div>
      </div>
    </div><!-- /tabXmlTemplate -->

    <div class="status-bar" id="statusBar">就绪</div>

    <!-- 调试面板 -->
    <div class="debug-toggle" id="debugToggle">
      <span>调试模式</span>
      <label class="switch">
        <input type="checkbox" id="debugMode">
        <span class="slider"></span>
      </label>
    </div>

    <div class="debug-panel" id="debugPanel" style="display: none;">
      <div class="debug-header">
        <span>通信日志</span>
        <button class="btn btn-sm" id="btnClearLogs">清空</button>
      </div>
      <div class="debug-logs" id="debugLogs"></div>
    </div>

    <!-- 添加变量弹窗 -->
    <div class="modal-overlay" id="addVarModal" style="display: none;">
      <div class="modal-card">
        <div class="modal-title">添加自定义变量</div>
        <div class="modal-body">
          <div class="modal-field">
            <label class="modal-label" for="modalVarName">变量名 <span class="required">*</span></label>
            <input type="text" id="modalVarName" class="modal-input" placeholder="例如：#myVar" autocomplete="off">
            <div class="modal-error" id="modalVarNameError">变量名不能为空</div>
          </div>
          <div class="modal-field">
            <label class="modal-label" for="modalVarDesc">描述说明</label>
            <input type="text" id="modalVarDesc" class="modal-input" placeholder="可选，用于说明变量用途" autocomplete="off">
          </div>
        </div>
        <div class="modal-actions">
          <button class="btn" id="btnModalCancel">取消</button>
          <button class="btn btn-primary" id="btnModalConfirm">确认添加</button>
        </div>
      </div>
    </div>

    <!-- 确认弹窗 -->
    <div class="modal-overlay" id="confirmModal" style="display: none;">
      <div class="modal-card modal-card-sm">
        <div class="modal-title" id="confirmModalTitle">确认操作</div>
        <div class="modal-body">
          <div class="modal-message" id="confirmModalMessage">确定要执行此操作吗？</div>
        </div>
        <div class="modal-actions">
          <button class="btn" id="btnConfirmCancel">取消</button>
          <button class="btn btn-primary" id="btnConfirmOk">确认</button>
        </div>
      </div>
    </div>

    <script src="lib/CSInterface.js"></script>
    <script src="bundle.js"></script>
  </div>
</body>

</html>
